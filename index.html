<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>falco · triage</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #0b0b0c; --panel: #131316; --line: #26262b;
      --fg: #e8e8ea; --muted: #8b8b93; --dim: #5c5c64;
      --accent: #f59e0b;
      --crit: #f04438; --warn: #f59e0b; --notice: #5b9dff; --info: #8b8b93; --debug: #4b4b52;
      --mono: ui-monospace, "Geist Mono", "SF Mono", Menlo, monospace;
      --ui: system-ui, "Geist", -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg); font-family: var(--ui);
      -webkit-font-smoothing: antialiased; padding-bottom: env(safe-area-inset-bottom);
    }
    .topbar {
      position: sticky; top: 0; z-index: 3; background: var(--bg);
      border-bottom: 1px solid var(--line);
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 7px; font-weight: 650; letter-spacing: -0.01em; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
           box-shadow: 0 0 0 0 var(--accent); animation: pulse 2.4s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245,158,11,.5);} 70%{ box-shadow:0 0 0 6px rgba(245,158,11,0);} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0);} }
    .counts { display: flex; gap: 6px; margin-left: auto; }
    .pill { font-family: var(--mono); font-size: 12px; color: var(--muted);
            background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; }
    .pill b { color: var(--fg); }
    .pill.crit b { color: var(--crit); }
    .pill.warn b { color: var(--warn); }
    .refresh { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
               border-radius: 8px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; }
    .refresh:active { background: var(--line); }

    #filters {
      position: sticky; top: 0; z-index: 2; background: var(--bg);
      border-bottom: 1px solid var(--line); padding: 8px 14px; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .chips { display: flex; gap: 6px; flex: 1 1 auto; }
    .chips label { font-size: 13px; color: var(--muted); background: var(--panel);
                   border: 1px solid var(--line); border-radius: 8px; padding: 6px 11px; cursor: pointer; }
    .chips label:has(input:checked) { color: #1a1a1a; background: var(--accent); border-color: var(--accent); font-weight: 600; }
    .chips input { position: absolute; opacity: 0; pointer-events: none; }
    .search { flex: 1 1 100%; font-family: var(--mono); font-size: 13px; color: var(--fg);
              background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
    .search::placeholder { color: var(--dim); }
    .search:focus-visible, .chips label:focus-within { outline: 2px solid var(--accent); outline-offset: 1px; }

    #feed { padding: 8px 12px 28px; display: flex; flex-direction: column; gap: 8px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--info);
            border-radius: 10px; overflow: hidden; }
    .card.crit { border-left-color: var(--crit); }
    .card.warn { border-left-color: var(--warn); }
    .card.notice { border-left-color: var(--notice); }
    .card.debug { border-left-color: var(--debug); }
    summary { list-style: none; cursor: pointer; padding: 11px 12px; display: flex; flex-direction: column; gap: 4px; }
    summary::-webkit-details-marker { display: none; }
    .row1 { display: flex; align-items: baseline; gap: 8px; }
    .tag { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
           padding: 2px 6px; border-radius: 5px; color: #111; background: var(--info); flex: none; }
    .tag.crit { background: var(--crit); color: #fff; }
    .tag.warn { background: var(--warn); }
    .tag.notice { background: var(--notice); color:#fff; }
    .tag.debug { background: var(--debug); color: var(--fg); }
    .rule { font-weight: 600; font-size: 14px; line-height: 1.25; flex: 1 1 auto; }
    .rel { font-family: var(--mono); font-size: 12px; color: var(--muted); flex: none; }
    .sub { font-family: var(--mono); font-size: 11.5px; color: var(--dim); }
    .output { margin: 0 12px 10px; padding-top: 8px; border-top: 1px solid var(--line);
              font-family: var(--mono); font-size: 12.5px; line-height: 1.5; color: var(--muted); word-break: break-word; }
    .fields { margin: 0 12px 10px; border-collapse: collapse; width: calc(100% - 24px); font-family: var(--mono); font-size: 12px; }
    .fields td { padding: 4px 8px; border-top: 1px solid var(--line); vertical-align: top; word-break: break-word; }
    .fields td:first-child { color: var(--dim); white-space: nowrap; width: 1%; }
    .tags { margin: 0 12px 12px; display: flex; flex-wrap: wrap; gap: 5px; }
    .tags span { font-family: var(--mono); font-size: 10.5px; color: var(--muted);
                 border: 1px solid var(--line); border-radius: 999px; padding: 1px 7px; }
    .empty { color: var(--dim); text-align: center; padding: 48px 16px; font-size: 14px; }

    .card[open] { animation: reveal .14s ease-out; }
    @keyframes reveal { from { opacity: .4; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .dot { animation: none; } .card[open] { animation: none; } }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="brand"><span class="dot" aria-hidden="true"></span>falco · triage</span>
    <span class="counts" id="counts">{% include "_counts.html" %}</span>
    <button class="refresh" title="Refresh" hx-get="/feed" hx-include="#filters" hx-target="#feed">↻</button>
  </header>

  <form id="filters">
    <div class="chips">
      <label><input type="radio" name="priority" value="" checked>All</label>
      <label><input type="radio" name="priority" value="critical">Critical</label>
      <label><input type="radio" name="priority" value="warning">Warning</label>
      <label><input type="radio" name="priority" value="other">Other</label>
    </div>
    <input class="search" type="search" name="q" placeholder="filter by rule, host, output…" autocomplete="off">
  </form>

  <main id="feed"
        hx-get="/feed"
        hx-include="#filters"
        hx-trigger="load, every {{ poll }}s, change from:#filters, keyup changed delay:400ms from:#filters">
    <div class="empty">Loading…</div>
  </main>
</body>
</html>
