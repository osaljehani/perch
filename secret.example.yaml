# Plaintext example. Encrypt with SOPS before committing, exactly like ntfy-secret.yaml:
#   sops --encrypt --in-place secret.yaml
# Generate a token once and reuse it on the falcosidekick side too:
#   openssl rand -hex 24
apiVersion: v1
kind: Secret
metadata:
  name: falco-triage-secret
  namespace: falco-triage
type: Opaque
stringData:
  webhook-secret: REPLACE_WITH_TOKEN
