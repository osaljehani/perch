name: release

# Build and publish a multi-arch (amd64 + arm64) image to GHCR.
# - On a pushed tag `v*`  -> build AND push `:<tag>` and `:latest`.
# - On a pull request     -> build only (no push), to catch Dockerfile breaks.
on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/release.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/perch

jobs:
  # Gate the published image on the suite: a tag build won't push unless tests
  # pass. (test.yml covers per-branch/PR feedback; this guards the release.)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: app
        run: python -m pytest -q

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (tag builds).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
