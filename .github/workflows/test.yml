name: test

# Run the pytest suite on every push and PR so a regression can't slip in
# unnoticed. Tests import `main` directly, so they run from app/ via
# `python -m pytest` (puts app/ on sys.path).
on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: app
        run: python -m pytest -q
