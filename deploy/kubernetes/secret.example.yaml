# Example. Copy to secret.yaml and set a real token (and encrypt with SOPS /
# Sealed Secrets before committing if you keep it in git).
#   openssl rand -hex 24
# Use the SAME token wherever you POST to perch (Falco http_output header, or
# the Falcosidekick webhook custom header).
apiVersion: v1
kind: Secret
metadata:
  name: perch-secret
  namespace: perch
type: Opaque
stringData:
  webhook-secret: REPLACE_WITH_TOKEN
