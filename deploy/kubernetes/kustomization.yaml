apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: perch
resources:
  - namespace.yaml
  - pvc.yaml
  # Ships with a placeholder token so `kubectl kustomize` renders out of the box.
  # Set a real token before exposing perch, and encrypt it (SOPS / Sealed
  # Secrets) if you commit it to git.
  - secret.example.yaml
  - deployment.yaml
  - service.yaml
