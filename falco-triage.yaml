apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: falco-triage
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/falco-triage
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system        # <-- match the sourceRef your clusters/blade14/falco.yaml uses
  decryption:
    provider: sops
    secretRef:
      name: sops-age         # <-- match the SOPS secret your other Kustomizations use
